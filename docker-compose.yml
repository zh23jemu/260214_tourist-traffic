services:
  mysql:
    image: mysql:8.4
    container_name: tourist_traffic_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tourist_traffic
      MYSQL_USER: tourist
      MYSQL_PASSWORD: tourist
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
